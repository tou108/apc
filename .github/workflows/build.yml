name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          echo "gradle-wrapper.properties updated"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MhxxSnipe-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: MhxxSnipe-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
